<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YDS 2026/2 Geri Sayım</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button id="theme-toggle" class="theme-btn">Karanlık Mod</button>
    <div class="container">
        <h1>YDS 2026/2'ye Kalan Süre</h1>
        <p class="exam-date">Sınav Tarihi: 22 Kasım 2026</p>
        <div class="countdown-container">
            <div class="time-box">
                <span id="days">00</span>
                 <p>Gün</p>
            </div>
            <div class="time-box">
                <span id="hours">00</span>
                 <p>Saat</p>
            </div>
            <div class="time-box">
                <span id="minutes">00</span>
                 <p>Dakika</p>
            </div>
            <div class="time-box">
                <span id="seconds">00</span>
                 <p>Saniye</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
